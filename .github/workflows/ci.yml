name: API Tests + Allure Report

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Allow manual run from GitHub UI
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── Integration Tests ────────────────────────────────────────────────────
  test:
    name: Run API Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: weather_user
          POSTGRES_PASSWORD: weather_pass
          POSTGRES_DB: weather_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      # Test backends will be started in this job
      WEATHER_API_URL: http://localhost:8080
      RACES_API_URL: http://localhost:8081
      INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
      # Allure writes results here by default (allure-go convention)
      ALLURE_OUTPUT_PATH: ${{ github.workspace }}/allure-results

    steps:
      - name: Checkout api-tests
        uses: actions/checkout@v4

      # ── Check out backends so we can start them ──────────────────────────
      - name: Checkout weather-api
        uses: actions/checkout@v4
        with:
          repository: 13axiom/weather-api
          path: _backends/weather-api
          # If the repo is private, add: token: ${{ secrets.GH_PAT }}

      - name: Checkout races-api
        uses: actions/checkout@v4
        with:
          repository: 13axiom/races-api
          path: _backends/races-api

      # ── Set up Go ────────────────────────────────────────────────────────
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      # ── Start weather-api ────────────────────────────────────────────────
      - name: Start weather-api
        working-directory: _backends/weather-api
        env:
          DATABASE_URL: postgres://weather_user:weather_pass@localhost:5432/weather_db
          PORT: "8080"
          SYNC_INTERVAL_HOURS: "9999"
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
          ALLOWED_ORIGINS: http://localhost:3000
        run: |
          go mod download
          go run ./cmd/server/... &
          echo "Waiting for weather-api..."
          timeout 30 bash -c 'until curl -sf http://localhost:8080/health; do sleep 1; done'
          echo "weather-api is up"

      # ── Start races-api ──────────────────────────────────────────────────
      - name: Start races-api
        working-directory: _backends/races-api
        env:
          DATABASE_URL: postgres://weather_user:weather_pass@localhost:5432/weather_db
          PORT: "8081"
          SYNC_INTERVAL_HOURS: "9999"
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          ALLOWED_ORIGINS: http://localhost:3000
        run: |
          go mod download
          go run ./cmd/server/... &
          echo "Waiting for races-api..."
          timeout 30 bash -c 'until curl -sf http://localhost:8081/health; do sleep 1; done'
          echo "races-api is up"

      # ── Download test dependencies ────────────────────────────────────────
      - name: Download test dependencies
        run: go mod download

      # ── Run tests ────────────────────────────────────────────────────────
      # -v        = verbose output in CI log
      # -count=1  = disable test cache (always run fresh)
      # Tests write Allure JSON to $ALLURE_OUTPUT_PATH
      - name: Run integration tests
        run: |
          mkdir -p allure-results
          go test ./tests/... -v -count=1 2>&1 | tee test-output.log
        # Don't fail the whole workflow on test failures —
        # we still want to generate the report to see what broke.
        continue-on-error: true

      # Save the raw test output as an artifact
      - name: Upload test log
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.log

      # Save raw Allure results (JSON files) — needed by the report job
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

  # ── Generate & Publish Allure Report ────────────────────────────────────
  allure-report:
    name: Allure Report → GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    # Run even if tests failed, so we can see the report
    if: always()

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      # ── Generate the HTML report ─────────────────────────────────────────
      - name: Generate Allure report
        uses: simple-elf/allure-report-action@v1.8
        with:
          allure_results: allure-results
          allure_report: allure-report
          # Keep last 20 runs in the history so trend graphs work
          keep_reports: 20
          gh_pages: gh-pages

      # ── Publish to GitHub Pages ──────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Print direct link in the CI summary
      - name: Print report URL
        run: |
          echo "## 📊 Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **[Open report](${{ steps.deployment.outputs.page_url }})**" >> $GITHUB_STEP_SUMMARY
