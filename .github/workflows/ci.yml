name: API Tests CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Needed to publish Allure report to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1: Compile — always runs, catches build-breaking changes quickly
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Compile test sources
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Compile test sources
        run: gradle testClasses --no-daemon

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2: Full integration run — starts both APIs + runs all test suites
  # Requires Postgres service + backend source repos.
  # Disable by setting repo variable ENABLE_API_TESTS = false.
  # ────────────────────────────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (all suites)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ vars.ENABLE_API_TESTS != 'false' }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: weather_user
          POSTGRES_PASSWORD: weather_pass
          POSTGRES_DB: weather_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      WEATHER_API_URL:  http://localhost:8080
      RACES_API_URL:    http://localhost:8081
      INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}

    steps:
      # ── 1. Checkout this repo ───────────────────────────────────────────────
      - name: Checkout api-running-portal-tests
        uses: actions/checkout@v4

      # ── 2. Checkout backend repos ───────────────────────────────────────────
      - name: Checkout weather-api
        uses: actions/checkout@v4
        with:
          repository: 13axiom/weather-api
          path: _backends/weather-api

      - name: Checkout races-api
        uses: actions/checkout@v4
        with:
          repository: 13axiom/races-api
          path: _backends/races-api

      # ── 3. Set up Go (for starting backend servers) ─────────────────────────
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      # ── 4. Start weather-api ────────────────────────────────────────────────
      - name: Start weather-api
        working-directory: _backends/weather-api
        env:
          DATABASE_URL:        postgres://weather_user:weather_pass@localhost:5432/weather_db
          PORT:                "8080"
          SYNC_INTERVAL_HOURS: "9999"
          INTERNAL_API_KEY:    ${{ secrets.INTERNAL_API_KEY }}
          OWM_API_KEY:         ${{ secrets.OWM_API_KEY }}
          ALLOWED_ORIGINS:     http://localhost:3000
        run: |
          go mod download
          go run ./cmd/server/... &
          timeout 30 bash -c 'until curl -sf http://localhost:8080/health; do sleep 1; done'
          echo "✅ weather-api is up"

      # ── 5. Start races-api ──────────────────────────────────────────────────
      - name: Start races-api
        working-directory: _backends/races-api
        env:
          DATABASE_URL:        postgres://weather_user:weather_pass@localhost:5432/weather_db
          PORT:                "8081"
          SYNC_INTERVAL_HOURS: "9999"
          INTERNAL_API_KEY:    ${{ secrets.INTERNAL_API_KEY }}
          ALLOWED_ORIGINS:     http://localhost:3000
        run: |
          go mod download
          go run ./cmd/server/... &
          timeout 30 bash -c 'until curl -sf http://localhost:8081/health; do sleep 1; done'
          echo "✅ races-api is up"

      # ── 6. Set up Java + Gradle ─────────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      # ── 7. Run tests ────────────────────────────────────────────────────────
      - name: Run all test suites
        run: >
          gradle test --no-daemon
          -Dallure.results.directory=${{ github.workspace }}/allure-results
        continue-on-error: true

      # ── 8. Upload Allure raw results ────────────────────────────────────────
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30

      # ── 9. Install Allure CLI + generate HTML report ────────────────────────
      - name: Install Allure CLI
        if: always()
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure-2.27.0.tgz
          echo "$PWD/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      # ── 10. Upload HTML report as artifact ──────────────────────────────────
      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-${{ github.run_number }}
          path: allure-report/
          retention-days: 30

      # ── 11. Publish to GitHub Pages ─────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        if: always()
        with:
          path: allure-report

      - name: Deploy to GitHub Pages
        id: deployment
        if: always()
        uses: actions/deploy-pages@v4

      # ── 12. Job summary ──────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## 🧪 Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download **Allure Report** from the Artifacts section, or open:" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **[${{ steps.deployment.outputs.page_url }}](${{ steps.deployment.outputs.page_url }})**" >> $GITHUB_STEP_SUMMARY

      # ── 13. Fail job if tests failed ─────────────────────────────────────────
      - name: Check test result
        if: always()
        run: |
          if [ -f build/reports/tests/test/index.html ]; then
            if grep -q "failures" build/reports/tests/test/index.html 2>/dev/null; then
              echo "❌ Some tests failed — check Allure report"
              exit 1
            fi
          fi
          echo "✅ All tests passed"
